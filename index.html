<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bob Esponja Aventura Submarina</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: linear-gradient(180deg, #0077be 0%, #003f6b 100%);
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    touch-action: none;
  }
  #gameContainer {
    position: relative; width: 100vw; height: 100vh;
    display: flex; justify-content: center; align-items: center;
  }
  canvas {
    display: block; background: linear-gradient(180deg, #87ceeb 0%, #4682b4 60%, #f4e4bc 100%);
    max-width: 100%; max-height: 100%; image-rendering: pixelated;
    border: 3px solid #ffd700; border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  #hud {
    position: absolute; top: 10px; left: 10px; right: 10px;
    display: flex; justify-content: space-between; align-items: center;
    color: white; font-weight: bold; font-size: 16px;
    text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 10;
  }
  .hud-item {
    background: rgba(0,0,0,0.5); padding: 6px 12px;
    border-radius: 20px; border: 2px solid #ffd700;
  }
  #controls {
    position: absolute;
    bottom: 20%;
    left: 0; right: 0;
    display: flex; justify-content: space-between; padding: 0 15px;
    z-index: 10; pointer-events: none;
  }
  .ctrl-group { display: flex; gap: 10px; pointer-events: auto; }
  .ctrl-group-right { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
  .btn {
    width: 65px; height: 65px; border-radius: 50%;
    background: rgba(255,215,0,0.85); border: 3px solid #fff;
    color: #000; font-size: 28px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
    cursor: pointer; transition: transform 0.05s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
  .btn-jump { background: rgba(255,100,100,0.85); }
  .btn-down { background: rgba(100,200,255,0.85); }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
    justify-content: center; align-items: center; color: white;
    text-align: center; padding: 20px; z-index: 20;
  }
  #overlay h1 { font-size: 36px; color: #ffd700; margin-bottom: 10px; text-shadow: 3px 3px 0 #000; }
  #overlay h2 { font-size: 24px; color: #ff6b6b; margin: 10px 0; }
  #overlay p { font-size: 16px; margin: 8px 0; max-width: 500px; line-height: 1.4; }
  #overlay button {
    margin-top: 20px; padding: 15px 40px; font-size: 20px; font-weight: bold;
    background: #ffd700; color: #000; border: 3px solid #fff;
    border-radius: 30px; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
  }
  #overlay button:active { transform: translateY(3px); }
  .hidden { display: none !important; }
  @media (max-width: 600px) {
    .btn { width: 55px; height: 55px; font-size: 24px; }
    .hud-item { font-size: 13px; padding: 5px 9px; }
    #overlay h1 { font-size: 26px; }
    #overlay h2 { font-size: 18px; }
    #overlay p { font-size: 14px; }
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="game"></canvas>
  <div id="hud" class="hidden">
    <div class="hud-item">❤️ Vidas: <span id="lives">5</span></div>
    <div class="hud-item">🍔 <span id="burgers">0</span>/10</div>
    <div class="hud-item">🎯 Fase: <span id="phase">1</span>/5</div>
  </div>
  <div id="controls" class="hidden">
    <div class="ctrl-group">
      <button class="btn" id="btnLeft">◀</button>
      <button class="btn" id="btnRight">▶</button>
    </div>
    <div class="ctrl-group-right">
      <button class="btn btn-jump" id="btnJump">⬆</button>
      <button class="btn btn-down" id="btnDown">⬇</button>
    </div>
  </div>
  <div id="overlay">
    <h1>🧽 Bob Esponja</h1>
    <h2>Aventura Submarina</h2>
    <p>Ajude o Bob Esponja a passar por 5 fases incríveis!</p>
    <p>🍔 A cada 10 hambúrgueres você ganha +1 vida!</p>
    <p>❤️ Você começa com 5 vidas</p>
    <button id="startBtn">▶ INICIAR JOGO</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const hud = document.getElementById('hud');
  const controls = document.getElementById('controls');
  const overlay = document.getElementById('overlay');
  const livesEl = document.getElementById('lives');
  const burgersEl = document.getElementById('burgers');
  const phaseEl = document.getElementById('phase');

  let W = 800, H = 500;
  function resize() {
    const ratio = W / H;
    let w = window.innerWidth;
    let h = window.innerHeight;
    if (w / h > ratio) w = h * ratio;
    else h = w / ratio;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
  }
  canvas.width = W; canvas.height = H;
  window.addEventListener('resize', resize);
  resize();

  const state = {
    lives: 5,
    burgers: 0,
    phase: 1,
    running: false,
    invuln: 0,
    keys: { left: false, right: false, jump: false, down: false }
  };

  function bindBtn(id, key) {
    const el = document.getElementById(id);
    const on = e => { e.preventDefault(); state.keys[key] = true; };
    const off = e => { e.preventDefault(); state.keys[key] = false; };
    el.addEventListener('touchstart', on, { passive: false });
    el.addEventListener('touchend', off);
    el.addEventListener('touchcancel', off);
    el.addEventListener('mousedown', on);
    el.addEventListener('mouseup', off);
    el.addEventListener('mouseleave', off);
  }
  bindBtn('btnLeft', 'left');
  bindBtn('btnRight', 'right');
  bindBtn('btnJump', 'jump');
  bindBtn('btnDown', 'down');

  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') state.keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') state.keys.right = true;
    if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w') state.keys.jump = true;
    if (e.key === 'ArrowDown' || e.key === 's') { e.preventDefault(); state.keys.down = true; }
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') state.keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') state.keys.right = false;
    if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w') state.keys.jump = false;
    if (e.key === 'ArrowDown' || e.key === 's') { e.preventDefault(); state.keys.down = false; }
  });

  function drawBob(x, y, w, h, flip = false, crouch = false) {
    ctx.save();
    if (flip) { ctx.translate(x + w, y); ctx.scale(-1, 1); x = 0; y = 0; }
    if (crouch) {
      // desenha Bob agachado (menor altura, maior largura)
      const cw = w * 1.2;
      const ch = h * 0.6;
      const cx = x + (w - cw)/2;
      const cy = y + (h - ch);
      ctx.fillStyle = '#ffeb3b';
      ctx.fillRect(cx, cy, cw, ch);
      ctx.strokeStyle = '#c9a227'; ctx.lineWidth = 2;
      ctx.strokeRect(cx, cy, cw, ch);
      ctx.fillStyle = '#c9a227';
      ctx.beginPath(); ctx.arc(cx + cw*0.25, cy + ch*0.3, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + cw*0.7, cy + ch*0.5, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + cw*0.4, cy + ch*0.75, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.arc(cx + cw*0.35, cy + ch*0.3, 8, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + cw*0.65, cy + ch*0.3, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#2196f3';
      ctx.beginPath(); ctx.arc(cx + cw*0.37, cy + ch*0.3, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + cw*0.67, cy + ch*0.3, 4, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx + cw*0.5, cy + ch*0.55, 10, 0, Math.PI); ctx.stroke();
      ctx.fillStyle = 'white';
      ctx.fillRect(cx + cw*0.45, cy + ch*0.55, 5, 7);
      ctx.fillRect(cx + cw*0.52, cy + ch*0.55, 5, 7);
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(cx, cy + ch*0.75, cw, ch*0.15);
      ctx.fillStyle = '#f44336';
      ctx.beginPath();
      ctx.moveTo(cx + cw*0.45, cy + ch*0.7);
      ctx.lineTo(cx + cw*0.55, cy + ch*0.7);
      ctx.lineTo(cx + cw*0.5, cy + ch*0.82);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffeb3b';
      ctx.fillRect(cx + cw*0.3, cy + ch*0.9, 5, ch*0.1);
      ctx.fillRect(cx + cw*0.65, cy + ch*0.9, 5, ch*0.1);
      ctx.fillStyle = '#000';
      ctx.fillRect(cx + cw*0.25, cy + ch, 12, 5);
      ctx.fillRect(cx + cw*0.6, cy + ch, 12, 5);
    } else {
      // desenho normal (original)
      ctx.fillStyle = '#ffeb3b';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#c9a227'; ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = '#c9a227';
      ctx.beginPath(); ctx.arc(x + w*0.25, y + h*0.3, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + w*0.7, y + h*0.5, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + w*0.4, y + h*0.75, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.arc(x + w*0.35, y + h*0.3, 8, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + w*0.65, y + h*0.3, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#2196f3';
      ctx.beginPath(); ctx.arc(x + w*0.37, y + h*0.3, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + w*0.67, y + h*0.3, 4, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x + w*0.5, y + h*0.55, 10, 0, Math.PI); ctx.stroke();
      ctx.fillStyle = 'white';
      ctx.fillRect(x + w*0.45, y + h*0.55, 5, 7);
      ctx.fillRect(x + w*0.52, y + h*0.55, 5, 7);
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(x, y + h*0.75, w, h*0.15);
      ctx.fillStyle = '#f44336';
      ctx.beginPath();
      ctx.moveTo(x + w*0.45, y + h*0.7);
      ctx.lineTo(x + w*0.55, y + h*0.7);
      ctx.lineTo(x + w*0.5, y + h*0.82);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffeb3b';
      ctx.fillRect(x + w*0.3, y + h*0.9, 5, h*0.1);
      ctx.fillRect(x + w*0.65, y + h*0.9, 5, h*0.1);
      ctx.fillStyle = '#000';
      ctx.fillRect(x + w*0.25, y + h, 12, 5);
      ctx.fillRect(x + w*0.6, y + h, 12, 5);
    }
    ctx.restore();
  }

  function drawPatrick(x, y, w, h) {
    ctx.save();
    ctx.fillStyle = '#ff69b4';
    ctx.beginPath();
    ctx.moveTo(x + w/2, y);
    ctx.lineTo(x + w, y + h*0.4);
    ctx.lineTo(x + w*0.8, y + h);
    ctx.lineTo(x + w*0.2, y + h);
    ctx.lineTo(x, y + h*0.4);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#c2185b'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(x + w*0.35, y + h*0.45, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.65, y + h*0.45, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x + w*0.37, y + h*0.45, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.67, y + h*0.45, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4caf50';
    ctx.fillRect(x + w*0.2, y + h*0.7, w*0.6, h*0.15);
    ctx.restore();
  }

  function drawSquidward(x, y, w, h) {
    ctx.save();
    ctx.fillStyle = '#81d4fa';
    ctx.fillRect(x + w*0.2, y + h*0.3, w*0.6, h*0.5);
    ctx.beginPath();
    ctx.ellipse(x + w/2, y + h*0.25, w*0.3, h*0.25, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffeb3b';
    ctx.beginPath(); ctx.arc(x + w*0.4, y + h*0.25, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.6, y + h*0.25, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4fc3f7';
    ctx.fillRect(x + w*0.47, y + h*0.3, w*0.06, h*0.1);
    ctx.fillStyle = '#795548';
    ctx.fillRect(x + w*0.2, y + h*0.55, w*0.6, h*0.25);
    ctx.restore();
  }

  function drawMrKrabs(x, y, w, h) {
    ctx.save();
    ctx.fillStyle = '#f44336';
    ctx.beginPath();
    ctx.ellipse(x + w/2, y + h*0.5, w*0.45, h*0.35, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(x + w*0.35, y + h*0.35, 7, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.65, y + h*0.35, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x + w*0.35, y + h*0.35, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.65, y + h*0.35, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#d32f2f';
    ctx.beginPath(); ctx.arc(x, y + h*0.5, 10, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w, y + h*0.5, 10, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#d32f2f'; ctx.lineWidth = 3;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x + w*0.3 + i*12, y + h*0.8);
      ctx.lineTo(x + w*0.3 + i*12, y + h);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawSandy(x, y, w, h) {
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.strokeStyle = '#ff9800'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(x + w/2, y + h*0.3, w*0.4, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#8d6e63';
    ctx.fillRect(x + w*0.25, y + h*0.45, w*0.5, h*0.45);
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x + w*0.4, y + h*0.3, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.6, y + h*0.3, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#9c27b0';
    ctx.fillRect(x + w*0.25, y + h*0.55, w*0.5, h*0.15);
    ctx.restore();
  }

  function drawPlankton(x, y, w, h) {
    ctx.save();
    ctx.fillStyle = '#4caf50';
    ctx.fillRect(x, y + h*0.3, w, h*0.5);
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(x + w*0.5, y + h*0.45, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f44336';
    ctx.beginPath(); ctx.arc(x + w*0.5, y + h*0.45, 4, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#4caf50'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + w*0.3, y + h*0.3);
    ctx.lineTo(x + w*0.2, y);
    ctx.moveTo(x + w*0.7, y + h*0.3);
    ctx.lineTo(x + w*0.8, y);
    ctx.stroke();
    ctx.restore();
  }
  function drawGary(x, y, w, h) {
    ctx.save();
    ctx.fillStyle = '#ff9800';
    ctx.beginPath();
    ctx.ellipse(x + w/2, y + h*0.4, w*0.45, h*0.35, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#e65100'; ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath();
    ctx.arc(x + w*0.5, y + h*0.4, w*0.2, 0, Math.PI*2);
    ctx.stroke();
    ctx.fillStyle = '#ff5722';
    ctx.fillRect(x + w*0.1, y + h*0.65, w*0.8, h*0.2);
    ctx.fillStyle = '#ffeb3b';
    ctx.beginPath(); ctx.arc(x + w*0.7, y + h*0.55, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.85, y + h*0.55, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x + w*0.7, y + h*0.55, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.85, y + h*0.55, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawMrsPuff(x, y, w, h) {
    ctx.save();
    ctx.fillStyle = '#fff9c4';
    ctx.beginPath();
    ctx.ellipse(x + w/2, y + h*0.5, w*0.48, h*0.45, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#f9a825'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#f9a825';
    for (let i = 0; i < 8; i++) {
      const ang = (i / 8) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(x + w/2 + Math.cos(ang) * w*0.45, y + h*0.5 + Math.sin(ang) * h*0.42);
      ctx.lineTo(x + w/2 + Math.cos(ang) * w*0.55, y + h*0.5 + Math.sin(ang) * h*0.52);
      ctx.lineTo(x + w/2 + Math.cos(ang + 0.2) * w*0.45, y + h*0.5 + Math.sin(ang + 0.2) * h*0.42);
      ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(x + w*0.4, y + h*0.4, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.6, y + h*0.4, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x + w*0.4, y + h*0.4, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.6, y + h*0.4, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e91e63';
    ctx.fillRect(x + w*0.2, y + h*0.75, w*0.6, h*0.2);
    ctx.restore();
  }

  function drawSprunki(x, y, w, h, color = '#9c27b0') {
    ctx.save();
    ctx.fillStyle = color;
    ctx.fillRect(x + w*0.1, y + h*0.3, w*0.8, h*0.6);
    ctx.beginPath();
    ctx.arc(x + w/2, y + h*0.3, w*0.35, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(x + w*0.35, y + h*0.3, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.65, y + h*0.3, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x + w*0.35, y + h*0.3, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.65, y + h*0.3, 4, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x + w/2, y + h*0.45, 7, 0, Math.PI); ctx.stroke();
    ctx.fillStyle = color;
    ctx.fillRect(x + w*0.25, y + h*0.9, 8, h*0.1);
    ctx.fillRect(x + w*0.65, y + h*0.9, 8, h*0.1);
    ctx.restore();
  }

  function drawCircusChar(x, y, w, h, type) {
    ctx.save();
    if (type === 'clown') {
      ctx.fillStyle = '#e91e63';
      ctx.fillRect(x + w*0.15, y + h*0.4, w*0.7, h*0.5);
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(x + w/2, y + h*0.3, w*0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff9800';
      ctx.beginPath(); ctx.arc(x + w*0.2, y + h*0.2, 10, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + w*0.8, y + h*0.2, 10, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + w/2, y + h*0.1, 10, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#f44336';
      ctx.beginPath(); ctx.arc(x + w/2, y + h*0.35, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(x + w*0.4, y + h*0.28, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + w*0.6, y + h*0.28, 3, 0, Math.PI*2); ctx.fill();
    } else if (type === 'acrobat') {
      ctx.fillStyle = '#3f51b5';
      ctx.fillRect(x + w*0.25, y + h*0.35, w*0.5, h*0.55);
      ctx.fillStyle = '#ffcc80';
      ctx.beginPath(); ctx.arc(x + w/2, y + h*0.25, w*0.22, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.fillRect(x + w*0.35, y + h*0.05, w*0.3, h*0.15);
      ctx.fillRect(x + w*0.25, y + h*0.18, w*0.5, h*0.05);
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(x + w*0.45, y + h*0.25, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + w*0.55, y + h*0.25, 3, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = '#795548';
      ctx.fillRect(x + w*0.2, y + h*0.4, w*0.6, h*0.5);
      ctx.fillStyle = '#ffcc80';
      ctx.beginPath(); ctx.arc(x + w/2, y + h*0.3, w*0.25, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.fillRect(x + w*0.3, y + h*0.05, w*0.4, h*0.2);
      ctx.fillRect(x + w*0.2, y + h*0.22, w*0.6, h*0.05);
      ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + w, y + h*0.5);
      ctx.lineTo(x + w*1.3, y + h*0.3);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBurger(x, y, w, h) {
    ctx.save();
    ctx.fillStyle = '#d4a056';
    ctx.beginPath();
    ctx.ellipse(x + w/2, y + h*0.3, w*0.5, h*0.3, 0, Math.PI, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x + w*0.35, y + h*0.2, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.6, y + h*0.15, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4caf50';
    ctx.fillRect(x + w*0.05, y + h*0.4, w*0.9, h*0.1);
    ctx.fillStyle = '#6d4c41';
    ctx.fillRect(x + w*0.1, y + h*0.5, w*0.8, h*0.15);
    ctx.fillStyle = '#ffc107';
    ctx.fillRect(x + w*0.08, y + h*0.65, w*0.84, h*0.08);
    ctx.fillStyle = '#d4a056';
    ctx.fillRect(x + w*0.1, y + h*0.73, w*0.8, h*0.2);
    ctx.restore();
  }

  function drawBoatMobile(x, y, w, h) {
    ctx.save();
    ctx.fillStyle = '#f44336';
    ctx.fillRect(x, y + h*0.3, w, h*0.5);
    ctx.fillStyle = '#81d4fa';
    ctx.fillRect(x + w*0.1, y + h*0.35, w*0.25, h*0.25);
    ctx.fillRect(x + w*0.45, y + h*0.35, w*0.25, h*0.25);
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x + w*0.2, y + h*0.9, h*0.18, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.8, y + h*0.9, h*0.18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#9e9e9e';
    ctx.beginPath(); ctx.arc(x + w*0.2, y + h*0.9, h*0.08, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.8, y + h*0.9, h*0.08, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffeb3b';
    ctx.fillRect(x + w*0.12, y + h*0.38, w*0.2, h*0.18);
    ctx.fillStyle = '#2196f3';
    ctx.beginPath(); ctx.arc(x + w*0.18, y + h*0.45, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w*0.26, y + h*0.45, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function rectCollide(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function drawBackground(type) {
    if (type === 'underwater') {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#4fc3f7');
      grad.addColorStop(0.7, '#0277bd');
      grad.addColorStop(1, '#f4e4bc');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      for (let i = 0; i < 10; i++) {
        const bx = (i * 97 + (Date.now() / 50) % W) % W;
        const by = (H - (Date.now() / 30 + i * 50) % H);
        ctx.beginPath(); ctx.arc(bx, by, 4 + (i % 3), 0, Math.PI*2); ctx.fill();
      }
    } else if (type === 'road') {
      ctx.fillStyle = '#87ceeb';
      ctx.fillRect(0, 0, W, H*0.4);
      ctx.fillStyle = '#9e9e9e';
      ctx.fillRect(0, H*0.4, W, H*0.5);
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 10; i++) {
        ctx.fillRect(i * 100 - (Date.now()/20 % 100), H*0.65, 50, 10);
      }
      ctx.fillStyle = '#4caf50';
      ctx.fillRect(0, H*0.9, W, H*0.1);
    } else if (type === 'circus') {
      ctx.fillStyle = '#1a0033';
      ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 20; i++) {
        const color = ['#f44336','#ffeb3b','#4caf50','#2196f3','#e91e63'][i%5];
        ctx.fillStyle = (Math.floor(Date.now()/200) + i) % 2 === 0 ? color : '#333';
        ctx.beginPath();
        ctx.arc(i * 45, 30, 10, 0, Math.PI*2);
        ctx.fill();
      }
      for (let i = 0; i < 15; i++) {
        ctx.fillStyle = i % 2 === 0 ? '#b71c1c' : '#fff';
        ctx.fillRect(i * 60, 0, 60, 50);
      }
    }
  }

  // ========== FASES ==========
  function phase1() {
    const player = { x: 50, y: H - 120, w: 45, h: 60, vx: 0, vy: 0, onGround: false, facing: 1, crouching: false };
    const platforms = [
      { x: 0, y: H - 40, w: W, h: 40 },
      { x: 200, y: H - 140, w: 120, h: 25 },
      { x: 380, y: H - 220, w: 120, h: 25 },
      { x: 550, y: H - 150, w: 120, h: 25 },
      { x: 700, y: H - 260, w: 120, h: 25 }
    ];
    const enemies = [
      { x: 300, y: H - 100, w: 45, h: 45, vx: -1.5, type: 'plankton' },
      { x: 600, y: H - 100, w: 45, h: 45, vx: -2, type: 'plankton' }
    ];
    const burgers = [
      { x: 230, y: H - 190, w: 35, h: 35, taken: false },
      { x: 410, y: H - 270, w: 35, h: 35, taken: false },
      { x: 580, y: H - 200, w: 35, h: 35, taken: false },
      { x: 730, y: H - 310, w: 35, h: 35, taken: false }
    ];
    const goal = { x: W - 50, y: H - 120, w: 40, h: 80 };
    const decor = [
      { x: 150, y: H - 110, draw: (x,y) => drawPatrick(x, y, 50, 65) },
      { x: 450, y: H - 110, draw: (x,y) => drawSquidward(x, y, 50, 70) },
      { x: 650, y: H - 110, draw: (x,y) => drawMrKrabs(x, y, 55, 65) }
    ];

    function update() {
      // crouch
      if (state.keys.down && player.onGround) {
        player.crouching = true;
      } else {
        player.crouching = false;
      }

      if (state.keys.left) { player.vx = -4; player.facing = -1; }
      else if (state.keys.right) { player.vx = 4; player.facing = 1; }
      else player.vx *= 0.8;
      if (state.keys.jump && player.onGround && !player.crouching) { player.vy = -13; player.onGround = false; }
      player.vy += 0.6;
      player.x += player.vx;
      player.y += player.vy;
      if (player.x < 0) player.x = 0;
      if (player.x + player.w > W) player.x = W - player.w;

      player.onGround = false;
      for (const p of platforms) {
        if (rectCollide(player, p)) {
          if (player.vy > 0 && player.y + player.h - player.vy <= p.y + 2) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
          } else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 2) {
            player.y = p.y + p.h;
            player.vy = 0;
          }
        }
      }
      for (const e of enemies) {
        e.x += e.vx;
        if (e.x < 0 || e.x + e.w > W) e.vx *= -1;
        if (rectCollide(player, e)) {
          if (player.vy > 0 && player.y + player.h < e.y + e.h/2) {
            e.x = -1000;
            player.vy = -9;
          } else if (state.invuln <= 0) {
            hitPlayer();
          }
        }
      }

      for (const b of burgers) {
        if (!b.taken && rectCollide(player, b)) {
          b.taken = true;
          collectBurger();
        }
      }

      if (rectCollide(player, goal)) { nextPhase(); }
      if (player.y > H + 100) hitPlayer(true);
    }

    function draw() {
      drawBackground('underwater');
      for (const p of platforms) {
        ctx.fillStyle = '#8d6e63';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 2;
        for (let i = 0; i < p.w; i += 25) {
          ctx.strokeRect(p.x + i, p.y, 25, p.h);
        }
      }
      for (const d of decor) d.draw(d.x, d.y);
      for (const b of burgers) if (!b.taken) drawBurger(b.x, b.y, b.w, b.h);
      for (const e of enemies) if (e.x > -500) drawPlankton(e.x, e.y, e.w, e.h);
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(goal.x + 5, goal.y, 5, goal.h);
      ctx.fillStyle = '#f44336';
      ctx.beginPath();
      ctx.moveTo(goal.x + 10, goal.y);
      ctx.lineTo(goal.x + 45, goal.y + 15);
      ctx.lineTo(goal.x + 10, goal.y + 30);
      ctx.closePath(); ctx.fill();
      if (state.invuln <= 0 || Math.floor(state.invuln/4) % 2 === 0) {
        drawBob(player.x, player.y, player.w, player.h, player.facing < 0, player.crouching);
      }
    }
    return { update, draw };
  }

  function phase2() {
    const boat = { x: 100, y: H*0.55, w: 150, h: 90, vy: 0, crouching: false }; // não usado, mas mantido
    const obstacles = [];
    const burgers = [];
    let spawnTimer = 0;
    let burgerTimer = 0;
    let distance = 0;
    const goalDist = 3000;
    const mrsPuff = { x: 20, y: 50 };

    function update() {
      distance += 3;
      if (state.keys.left || state.keys.jump) boat.vy = -4;
      else if (state.keys.right) boat.vy = 4;
      else boat.vy *= 0.9;
      boat.y += boat.vy;
      if (boat.y < H*0.4) boat.y = H*0.4;
      if (boat.y + boat.h > H*0.85) boat.y = H*0.85 - boat.h;

      spawnTimer++;
      if (spawnTimer > 60) {
        spawnTimer = 0;
        const types = ['cone', 'rock', 'puff'];
        const type = types[Math.floor(Math.random() * types.length)];
        obstacles.push({
          x: W + 50,
          y: H*0.45 + Math.random() * (H*0.35),
          w: 55, h: 55, type
        });
      }
      burgerTimer++;
      if (burgerTimer > 120) {
        burgerTimer = 0;
        burgers.push({
          x: W + 50,
          y: H*0.45 + Math.random() * (H*0.35),
          w: 35, h: 35, taken: false
        });
      }

      for (const o of obstacles) o.x -= 5;
      for (const b of burgers) b.x -= 5;

      for (const o of obstacles) {
        if (o.x > -100 && rectCollide(boat, o) && state.invuln <= 0) {
          hitPlayer();
          o.x = -1000;
        }
      }
      for (const b of burgers) {
        if (!b.taken && rectCollide(boat, b)) {
          b.taken = true;
          collectBurger();
        }
      }

      obstacles.splice(0, obstacles.length, ...obstacles.filter(o => o.x > -100));
      burgers.splice(0, burgers.length, ...burgers.filter(b => b.x > -100 && !b.taken));

      if (distance >= goalDist) nextPhase();
    }

    function draw() {
      drawBackground('road');
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(W/2 - 100, 15, 200, 15);
      ctx.fillStyle = '#4caf50';
      ctx.fillRect(W/2 - 100, 15, 200 * (distance/goalDist), 15);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.strokeRect(W/2 - 100, 15, 200, 15);

      drawMrsPuff(mrsPuff.x, mrsPuff.y, 80, 80);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif';
      ctx.fillText('Sra. Puff:', mrsPuff.x + 90, mrsPuff.y + 25);
      ctx.fillText(distance < goalDist * 0.5 ? 'Cuidado!' : 'Muito bem!', mrsPuff.x + 90, mrsPuff.y + 40);

      for (const o of obstacles) {
        if (o.type === 'cone') {
          ctx.fillStyle = '#ff5722';
          ctx.beginPath();
          ctx.moveTo(o.x + o.w/2, o.y);
          ctx.lineTo(o.x + o.w, o.y + o.h);
          ctx.lineTo(o.x, o.y + o.h);
          ctx.closePath(); ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.fillRect(o.x + 8, o.y + o.h*0.4, o.w - 16, 8);
        } else if (o.type === 'rock') {
          ctx.fillStyle = '#616161';
          ctx.beginPath();
          ctx.ellipse(o.x + o.w/2, o.y + o.h/2, o.w/2, o.h/2, 0, 0, Math.PI*2);
          ctx.fill();
        } else {
          drawMrsPuff(o.x, o.y, o.w, o.h);
        }
      }
      for (const b of burgers) if (!b.taken) drawBurger(b.x, b.y, b.w, b.h);
      drawBoatMobile(boat.x, boat.y, boat.w, boat.h);
    }

    return { update, draw };
  }

  function phase3() {
    const player = { x: 100, y: H - 120, w: 45, h: 60, vy: 0, onGround: false, crouching: false };
    const ground = H - 50;
    const sprunkis = [];
    const burgers = [];
    let spawnTimer = 0;
    let distance = 0;
    const goalDist = 2500;
    const colors = ['#9c27b0', '#e91e63', '#3f51b5', '#009688', '#ff5722'];

    function update() {
      // crouch
      if (state.keys.down && player.onGround) {
        player.crouching = true;
      } else {
        player.crouching = false;
      }

      distance += 4;
      if (state.keys.left) player.x -= 3;
      if (state.keys.right) player.x += 3;
      if (player.x < 20) player.x = 20;
      if (player.x > W/2) player.x = W/2;
      if (state.keys.jump && player.onGround && !player.crouching) { player.vy = -14; player.onGround = false; }
      player.vy += 0.6;
      player.y += player.vy;
      if (player.y + player.h >= ground) {
        player.y = ground - player.h;
        player.vy = 0;
        player.onGround = true;
      }

      spawnTimer++;
      if (spawnTimer > 40) {
        spawnTimer = 0;
        sprunkis.push({
          x: W + 50,
          y: ground - 65 - Math.random() * 120,
          w: 50, h: 65,
          vx: -4 - Math.random() * 2,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
      if (Math.random() < 0.008) {
        burgers.push({
          x: W + 50,
          y: ground - 100 - Math.random() * 180,
          w: 35, h: 35, taken: false
        });
      }
      for (const s of sprunkis) s.x += s.vx;
      for (const b of burgers) b.x -= 5;

      for (const s of sprunkis) {
        if (s.x > -100 && rectCollide(player, s) && state.invuln <= 0) {
          hitPlayer();
        }
      }
      for (const b of burgers) {
        if (!b.taken && rectCollide(player, b)) {
          b.taken = true;
          collectBurger();
        }
      }

      sprunkis.splice(0, sprunkis.length, ...sprunkis.filter(s => s.x > -100));
      burgers.splice(0, burgers.length, ...burgers.filter(b => b.x > -100 && !b.taken));

      if (distance >= goalDist) nextPhase();
    }

    function draw() {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#4a148c');
      grad.addColorStop(1, '#1a0033');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 30; i++) {
        const sx = (i * 53 - distance) % W;
        const sy = (i * 37) % (H - 120);
        ctx.fillRect(sx < 0 ? sx + W : sx, sy, 3, 3);
      }
      ctx.fillStyle = '#3e2723';
      ctx.fillRect(0, ground, W, H - ground);
      ctx.fillStyle = '#5d4037';
      for (let i = 0; i < W; i += 40) {
        ctx.fillRect(i - (distance % 40), ground, 25, 8);
      }
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(W/2 - 100, 15, 200, 15);
      ctx.fillStyle = '#ff9800';
      ctx.fillRect(W/2 - 100, 15, 200 * (distance/goalDist), 15);

      for (const s of sprunkis) drawSprunki(s.x, s.y, s.w, s.h, s.color);
      for (const b of burgers) if (!b.taken) drawBurger(b.x, b.y, b.w, b.h);
      if (state.invuln <= 0 || Math.floor(state.invuln/4) % 2 === 0) {
        drawBob(player.x, player.y, player.w, player.h, false, player.crouching);
      }
      ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif';
      ctx.fillText('FUJA DOS SPRUNKIS!', W/2 - 90, 50);
    }

    return { update, draw };
  }

  function phase4() {
    const player = { x: 50, y: H - 120, w: 45, h: 60, vx: 0, vy: 0, onGround: false, jumps: 0, facing: 1, crouching: false };
    const platforms = [];
    const spikes = [];
    const burgers = [];
    let camX = 0;
    const goalX = 3000;
    let px = 0;
    while (px < goalX + 500) {
      const w = 100 + Math.random() * 120;
      const y = H - 100 - Math.random() * 200;
      platforms.push({ x: px, y, w, h: 20 });
      if (Math.random() < 0.3 && w > 80) {
        spikes.push({ x: px + 35, y: y - 20, w: 25, h: 20 });
      }
      if (Math.random() < 0.5) {
        burgers.push({ x: px + w/2 - 17, y: y - 60, w: 35, h: 35, taken: false });
      }
      px += w + 50 + Math.random() * 60;
    }
    platforms.unshift({ x: -100, y: H - 40, w: 400, h: 40 });
    platforms.push({ x: goalX - 100, y: H - 40, w: 400, h: 40 });
    const decor = [
      { x: 500, y: H - 110, draw: (x,y) => drawSandy(x, y, 55, 75) },
      { x: 1500, y: H - 90, draw: (x,y) => drawGary(x, y, 55, 45) },
      { x: 2500, y: H - 110, draw: (x,y) => drawPatrick(x, y, 55, 70) }
    ];

    function update() {
      // crouch
      if (state.keys.down && player.onGround) {
        player.crouching = true;
      } else {
        player.crouching = false;
      }

      if (state.keys.left) { player.vx = -5; player.facing = -1; }
      else if (state.keys.right) { player.vx = 5; player.facing = 1; }
      else player.vx *= 0.85;
      if (state.keys.jump && !player.crouching) {
        if (player.onGround) { player.vy = -14; player.onGround = false; player.jumps = 1; state.keys.jump = false; }
        else if (player.jumps < 2) { player.vy = -12; player.jumps++; state.keys.jump = false; }
      }
      player.vy += 0.6;
      player.x += player.vx;
      player.y += player.vy;
      if (player.x < 0) player.x = 0;

      player.onGround = false;
      for (const p of platforms) {
        if (player.x + player.w > p.x && player.x < p.x + p.w) {
          if (player.vy > 0 && player.y + player.h - player.vy <= p.y + 2) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
            player.jumps = 0;
          }
        }
      }

      for (const s of spikes) {
        if (rectCollide(player, s) && state.invuln <= 0) hitPlayer();
      }

      for (const b of burgers) {
        if (!b.taken && rectCollide(player, { x: b.x - camX, y: b.y, w: b.w, h: b.h })) {
          b.taken = true; collectBurger();
        }
      }

      if (player.y > H + 100) hitPlayer(true);
      camX = player.x - W/3;
      if (camX < 0) camX = 0;
      if (player.x >= goalX) nextPhase();
    }

    function draw() {
      drawBackground('underwater');
      ctx.save();
      ctx.translate(-camX, 0);
      for (const p of platforms) {
        ctx.fillStyle = '#5d4037';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#4caf50';
        ctx.fillRect(p.x, p.y, p.w, 6);
      }
      for (const s of spikes) {
        ctx.fillStyle = '#bdbdbd';
        for (let i = 0; i < s.w; i += 6) {
          ctx.beginPath();
          ctx.moveTo(s.x + i, s.y + s.h);
          ctx.lineTo(s.x + i + 3, s.y);
          ctx.lineTo(s.x + i + 6, s.y + s.h);
          ctx.closePath(); ctx.fill();
        }
      }
      for (const d of decor) d.draw(d.x, d.y);
      for (const b of burgers) if (!b.taken) drawBurger(b.x, b.y, b.w, b.h);
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(goalX, H - 140, 6, 100);
      ctx.fillStyle = '#f44336';
      ctx.beginPath();
      ctx.moveTo(goalX + 6, H - 140);
      ctx.lineTo(goalX + 50, H - 120);
      ctx.lineTo(goalX + 6, H - 100);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif';
      ctx.fillText('META', goalX - 10, H - 150);
      if (state.invuln <= 0 || Math.floor(state.invuln/4) % 2 === 0) {
        drawBob(player.x, player.y, player.w, player.h, player.facing < 0, player.crouching);
      }
      ctx.restore();
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(W/2 - 100, 15, 200, 15);
      ctx.fillStyle = '#00bcd4';
      ctx.fillRect(W/2 - 100, 15, 200 * (player.x/goalX), 15);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.strokeRect(W/2 - 100, 15, 200, 15);
    }

    return { update, draw };
  }

  function phase5() {
    const player = { x: W/2 - 22, y: H - 120, w: 45, h: 60, vx: 0, vy: 0, onGround: false, facing: 1, crouching: false };
    const ground = H - 50;
    const enemies = [];
    const burgers = [];
    let spawnTimer = 0;
    let distance = 0;
    const goalDist = 3500;
    const types = ['clown', 'acrobat', 'tamer'];

    function update() {
      // crouch
      if (state.keys.down && player.onGround) {
        player.crouching = true;
      } else {
        player.crouching = false;
      }

      distance += 3;
      if (state.keys.left) { player.vx = -5; player.facing = -1; }
      else if (state.keys.right) { player.vx = 5; player.facing = 1; }
      else player.vx *= 0.85;
      if (state.keys.jump && player.onGround && !player.crouching) { player.vy = -14; player.onGround = false; }
      player.vy += 0.6;
      player.x += player.vx;
      player.y += player.vy;
      if (player.x < 20) player.x = 20;
      if (player.x + player.w > W - 20) player.x = W - 20 - player.w;
      if (player.y + player.h >= ground) {
        player.y = ground - player.h;
        player.vy = 0;
        player.onGround = true;
      }

      spawnTimer++;
      if (spawnTimer > 50) {
        spawnTimer = 0;
        const side = Math.random() < 0.5 ? -60 : W + 60;
        enemies.push({
          x: side,
          y: ground - 75 - Math.random() * 180,
          w: 60, h: 75,
          vx: side < 0 ? 3 + Math.random() * 2 : -3 - Math.random() * 2,
          vy: 0,
          type: types[Math.floor(Math.random() * types.length)]
        });
      }
      if (Math.random() < 0.008) {
        burgers.push({
          x: Math.random() * (W - 60) + 30,
          y: ground - 120 - Math.random() * 230,
          w: 35, h: 35, taken: false
        });
      }

      for (const e of enemies) {
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 0) {
          e.x += (dx/dist) * 2;
          e.y += (dy/dist) * 1.5;
        }
        if (rectCollide(player, e) && state.invuln <= 0) hitPlayer();
      }
      for (const b of burgers) {
        if (!b.taken && rectCollide(player, b)) {
          b.taken = true; collectBurger();
        }
      }

      enemies.splice(0, enemies.length, ...enemies.filter(e => e.x > -200 && e.x < W + 200));
      burgers.splice(0, burgers.length, ...burgers.filter(b => !b.taken));

      if (distance >= goalDist) nextPhase();
    }

    function draw() {
      drawBackground('circus');
      ctx.fillStyle = '#8b0000';
      ctx.fillRect(0, ground, W, H - ground);
      ctx.fillStyle = '#ffd700';
      for (let i = 0; i < W; i += 50) {
        ctx.beginPath();
        ctx.moveTo(i, ground);
        ctx.lineTo(i + 25, ground + 12);
        ctx.lineTo(i + 50, ground);
        ctx.closePath(); ctx.fill();
      }
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(W/2 - 100, 15, 200, 15);
      ctx.fillStyle = '#e91e63';
      ctx.fillRect(W/2 - 100, 15, 200 * (distance/goalDist), 15);
      for (const e of enemies) drawCircusChar(e.x, e.y, e.w, e.h, e.type);
      for (const b of burgers) if (!b.taken) drawBurger(b.x, b.y, b.w, b.h);
      if (state.invuln <= 0 || Math.floor(state.invuln/4) % 2 === 0) {
        drawBob(player.x, player.y, player.w, player.h, player.facing < 0, player.crouching);
      }
      ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif';
      ctx.fillText('🎪 CIRCO DIGITAL - FUJA!', W/2 - 110, 55);
    }

    return { update, draw };
  }

  let currentPhase = null;

  function hitPlayer(fell = false) {
    if (state.invuln > 0 && !fell) return;
    state.lives--;
    state.invuln = 60;
    updateHUD();
    if (state.lives <= 0) {
      gameOver();
    } else if (fell) {
      // reposição automática tratada nas fases
    }
  }

  function collectBurger() {
    state.burgers++;
    if (state.burgers >= 10) {
      state.burgers = 0;
      state.lives++;
      showFloatingText('+1 VIDA!');
    }
    updateHUD();
  }

  let floatingTexts = [];
  function showFloatingText(text) {
    floatingTexts.push({ text, y: H/2, alpha: 1 });
  }

  function updateHUD() {
    livesEl.textContent = state.lives;
    burgersEl.textContent = state.burgers;
    phaseEl.textContent = state.phase;
  }

  function nextPhase() {
    state.phase++;
    if (state.phase > 5) {
      victory();
    } else {
      showPhaseIntro();
    }
  }

  function showPhaseIntro() {
    state.running = false;
    const intros = {
      2: { title: 'Fase 2: Autoescola da Sra. Puff', desc: 'Dirija o Barco-Mobile e desvie dos obstáculos!\nUse ◀ ▶ para subir e descer.' },
      3: { title: 'Fase 3: Fuga dos Sprunkis', desc: 'A tela rola sem parar! Fuja dos Sprunkis!\nUse ◀ ▶ para mover e ⬆ para pular.' },
      4: { title: 'Fase 4: Parkour Radical', desc: 'Pule entre plataformas e evite os espinhos!\nPulo duplo disponível! ⬆⬆' },
      5: { title: 'Fase 5: Circo Digital', desc: 'Fuja dos personagens do circo digital!\nEles te perseguem! Use ◀ ▶ ⬆' }
    };
    const info = intros[state.phase];
    overlay.innerHTML = `
      <h1>🎯 ${info.title}</h1>
      <p style="white-space: pre-line">${info.desc}</p>
      <p>❤️ Vidas: ${state.lives} | 🍔 ${state.burgers}/10</p>
      <button id="continueBtn">▶ CONTINUAR</button>
    `;
    overlay.classList.remove('hidden');
    document.getElementById('continueBtn').onclick = () => {
      overlay.classList.add('hidden');
      startPhase();
    };
  }

  function startPhase() {
    if (state.phase === 1) currentPhase = phase1();
    else if (state.phase === 2) currentPhase = phase2();
    else if (state.phase === 3) currentPhase = phase3();
    else if (state.phase === 4) currentPhase = phase4();
    else if (state.phase === 5) currentPhase = phase5();
    state.running = true;
    updateHUD();
  }

  function gameOver() {
    state.running = false;
    overlay.innerHTML = `
      <h1>💀 GAME OVER</h1>
      <h2>Você chegou até a Fase ${state.phase}</h2>
      <p>Tente novamente, Bob Esponja conta com você!</p>
      <button id="retryBtn">🔄 JOGAR NOVAMENTE</button>
    `;
    overlay.classList.remove('hidden');
    document.getElementById('retryBtn').onclick = () => {
      state.lives = 5;
      state.burgers = 0;
      state.phase = 1;
      overlay.classList.add('hidden');
      startPhase();
    };
  }

  function victory() {
    state.running = false;
    overlay.innerHTML = `
      <h1>🏆 VITÓRIA!</h1>
      <h2>Bob Esponja completou todas as fases!</h2>
      <p>❤️ Vidas finais: ${state.lives}</p>
      <p>🍔 Hambúrgueres coletados: muito!</p>
      <p>🎉 Parabéns, você é um verdadeiro herói de Fenda do Biquíni!</p>
      <button id="againBtn">🔄 JOGAR DE NOVO</button>
    `;
    overlay.classList.remove('hidden');
    document.getElementById('againBtn').onclick = () => {
      state.lives = 5;
      state.burgers = 0;
      state.phase = 1;
      overlay.classList.add('hidden');
      startPhase();
    };
  }

  function loop() {
    if (state.running && currentPhase) {
      currentPhase.update();
      currentPhase.draw();
      if (state.invuln > 0) state.invuln--;
      for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const ft = floatingTexts[i];
        ft.y -= 1;
        ft.alpha -= 0.015;
        ctx.fillStyle = `rgba(255,215,0,${ft.alpha})`;
        ctx.font = 'bold 30px sans-serif';
        ctx.fillText(ft.text, W/2 - 60, ft.y);
        if (ft.alpha <= 0) floatingTexts.splice(i, 1);
      }
    }
    requestAnimationFrame(loop);
  }

  document.getElementById('startBtn').onclick = () => {
    overlay.classList.add('hidden');
    hud.classList.remove('hidden');
    controls.classList.remove('hidden');
    startPhase();
  };

  loop();
})();
</script>
</body>
