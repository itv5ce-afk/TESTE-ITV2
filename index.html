<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <link rel="icon" type="image/png" href="https://github.com/itv5ce-afk/LOGO_ITVPLAYER/raw/refs/heads/main/20211122_192815.ico">
    <title>ITVClientes.2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: #fff; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif; padding-bottom: 80px; }
        .navbar { background-color: #111; border-top: 1px solid #333; position: fixed; bottom: 0; left: 0; right: 0; top: auto; z-index: 1020; padding: 6px 10px; }
        .card-cliente { background-color: #1a1a1a; border: 1px solid #333; border-radius: 12px; margin-bottom: 12px; padding: 14px; transition: all 0.1s ease; cursor: pointer; }
        .card-cliente:active { transform: scale(0.98); }
        .btn-small { font-size: 0.7rem; padding: 5px; flex: 1; margin: 2px; border: none; color: white; border-radius: 30px; font-weight: 500; }
        .bg-lilas { background-color: #9933ff !important; color: white; }
        #adminLock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .menu-lateral { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #111; overflow-x: hidden; transition: 0.3s; padding-top: 60px; box-shadow: 2px 0 12px rgba(0,0,0,0.5); }
        .menu-lateral a, .menu-lateral label { padding: 8px 32px; text-decoration: none; font-size: 16px; color: #ddd; display: block; }
        .card-financeiro { background: #222; border-left: 4px solid #9933ff; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        .stat-val { font-size: 1.4rem; font-weight: bold; color: #00ff00; }
        .stat-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .auth-card { background: #111; border: 1px solid #333; border-radius: 24px; padding: 28px 22px; width: 100%; max-width: 380px; margin: 16px; }
        .filter-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .filter-buttons button { flex: 1; min-width: 70px; font-size: 0.75rem; font-weight: 600; border-radius: 40px; padding: 6px 0; }
        .btn-sm-custom { font-size: 0.7rem; padding: 6px 12px; border-radius: 40px; font-weight: 500; }
        .modal-content { background: #1e1e1e; border-radius: 28px; border: none; }
        input, textarea, .form-control, .form-select { background-color: #2a2a2a !important; color: white !important; border-color: #444 !important; border-radius: 14px !important; }
        input:focus, textarea:focus { border-color: #9933ff !important; box-shadow: 0 0 0 2px rgba(153,51,255,0.3) !important; }
        .badge { font-size: 0.7rem; padding: 5px 10px; border-radius: 50px; }
        hr { opacity: 0.3; }
        .btn-outline-light { border-radius: 40px; }
        .nav-buttons-painel { display: flex; gap: 8px; margin-bottom: 20px; }
        
        /* Novos estilos para o card de informações */
        .cliente-info { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; font-size: 0.78rem; color: #ccc; margin-top: 6px; }
        .cliente-info .info-item { display: flex; gap: 4px; }
        .cliente-info .info-label { color: #888; font-weight: 500; }
        .cliente-info .info-value { color: #fff; word-break: break-all; }
        .cliente-info .info-full { grid-column: 1 / -1; }
        
        /* Estilos para os botões do modal de ações */
        .modal-acoes-grid { display: flex; flex-direction: column; gap: 10px; }
        .modal-acoes-row { display: flex; gap: 8px; }
        .modal-acoes-row .btn { flex: 1; font-size: 0.78rem; font-weight: 600; padding: 10px 4px; border-radius: 12px; border: none; color: white; display: flex; align-items: center; justify-content: center; gap: 4px; }

        /* NOVA NAVBAR INFERIOR */
        .navbar-inferior {            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 10px;
        }
        .navbar-inferior .nav-left,
        .navbar-inferior .nav-right {
            flex: 1;
            display: flex;
            align-items: center;
        }
        .navbar-inferior .nav-right {
            justify-content: flex-end;
        }
        .navbar-inferior .nav-center {
            flex: 0 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-add-fixo {
            background-color: #198754;
            color: white;
            border: none;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 -2px 12px rgba(25,135,84,0.5);
            margin-top: -20px;
        }
        .btn-add-fixo:active { transform: scale(0.95); }
        .navbar-brand-bottom {
            color: #fff !important;
            font-weight: 600;
            font-size: 0.95rem;
            margin: 0;
            white-space: nowrap;
        }
        .navbar-brand-bottom small {
            display: block;
            font-size: 0.6rem;
            color: #aaa;
            font-weight: 400;
        }
        .btn-menu-bottom {            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.6rem;
            padding: 4px 8px;
        }
        
        @media (max-width: 576px) {
            .card-cliente h5 { font-size: 1rem; }
            .stat-val { font-size: 1.2rem; }
            .modal-acoes-row .btn { font-size: 0.72rem; padding: 9px 2px; }
            .navbar-brand-bottom { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <div class="text-center mb-4">
            <h3 class="text-white"><i class="bi bi-shield-lock text-success"></i> ITVPlayer</h3>
            <p class="text-secondary small">Credenciais para acessar o sistema</p>
        </div>
        <div id="formLogin">
            <div class="mb-3">
                <label class="form-label small text-secondary">E-mail</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="seu@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label small text-secondary">Senha</label>
                <input type="password" id="loginSenha" class="form-control" placeholder="******">
            </div>
            <button class="btn btn-success w-100 bg-lilas border-0 py-2" onclick="handleLogin()">Entrar no Sistema</button>
        </div>
    </div>
</div>

<div id="adminLock" style="display: none;">
    <h2>🔒 Contato com ADM</h2>
    <p>Acesso temporariamente bloqueado</p>
    <button class="btn btn-success mb-3" onclick="window.open('https://wa.me/5585996498573')"><i class="bi bi-whatsapp"></i> WhatsApp ADM</button>
    <input type="password" id="adminPass" class="form-control w-50 mb-2" placeholder="Senha mestre">
    <button class="btn btn-primary" onclick="unlockApp()">Desbloquear</button>
</div>

<div id="mySidenav" class="menu-lateral">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <div class="p-3">
        <label>📢 Msg Cobrança:</label>
        <textarea id="cfgMsg" class="form-control mb-2" rows="2"></textarea>        <label>🔗 Painel 1 (CENTRAL):</label>
        <input type="text" id="url1" class="form-control mb-2">
        <label>🔗 Painel 2 (WAREZ):</label>
        <input type="text" id="url2" class="form-control mb-2">
        <label>🔗 Painel 3 (ZEUS):</label>
        <input type="text" id="url3" class="form-control mb-2">
        <button class="btn btn-info w-100 mt-2" onclick="saveSettings()">Salvar Configurações</button>
        <button class="btn btn-danger w-100 mt-4" onclick="handleLogout()">Sair da Conta</button>
    </div>
</div>

<!-- NOVA NAVBAR FIXA NA PARTE INFERIOR -->
<nav class="navbar">
    <div class="navbar-inferior">
        <div class="nav-left">
            <button class="btn-menu-bottom" onclick="openNav()"><i class="bi bi-list"></i></button>
        </div>
        <div class="nav-center">
            <button class="btn btn-add-fixo" onclick="showModalCadastro()"><i class="bi bi-plus-lg"></i></button>
        </div>
        <div class="nav-right">
            <div class="navbar-brand-bottom text-end">
                ITVPlayer
                <small id="userEmailDisplay"></small>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-2">
    <div id="adminPanel" class="mb-4 p-2">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
            <h5 class="m-0"><i class="bi bi-cash-stack text-success"></i> Financeiro</h5>
            <input type="month" id="filterMes" class="form-control w-auto bg-dark text-white border-secondary" style="max-width: 170px;">
        </div>
        <div class="row g-2">
            <div class="col-6 col-md-3"><div class="card-financeiro"><div class="stat-label">Recebido (Mês)</div><div class="stat-val" id="finRecebido">R$ 0,00</div></div></div>
            <div class="col-6 col-md-3"><div class="card-financeiro" style="border-left-color: #ffc107;"><div class="stat-label">A Receber</div><div class="stat-val text-warning" id="finPendente">R$ 0,00</div></div></div>
            <div class="col-6 col-md-3"><div class="card-financeiro" style="border-left-color: #0dcaf0;"><div class="stat-label">Total Clientes</div><div class="stat-val text-info" id="finTotalClientes">0</div></div></div>
            <div class="col-6 col-md-3"><div class="card-financeiro" style="border-left-color: #00ff00;"><div class="stat-label">Lucro Geral</div><div class="stat-val" id="finGeral" style="color: #00ff00;">R$ 0,00</div></div></div>
        </div>
        <hr class="border-secondary">
    </div>

    <input type="text" id="search" class="form-control mb-3" placeholder="🔍 Buscar cliente por nome..." onkeyup="renderClientes()">

    <div class="filter-buttons">
        <button class="btn-small bg-primary" onclick="filterData('ativos')">ATIVOS <span id="countAtivos">0</span></button>
        <button class="btn-small" style="background-color: orange;" onclick="filterData('vencer')">A VENCER <span id="countVencer">0</span></button>
        <button class="btn-small bg-danger" onclick="filterData('expirados')">EXPIRADOS <span id="countExp">0</span></button>        <button class="btn-small bg-info" onclick="filterData('apagar')">A RECEBER <span id="countPagar">0</span></button>
        <button class="btn-small bg-secondary" onclick="filterData('deletados')">LIXO <span id="countDel">0</span></button>
    </div>

    <div class="nav-buttons-painel">
        <button class="btn btn-outline-light btn-sm w-100" onclick="accessPanel(1)">📡 CENTRAL</button>
        <button class="btn btn-outline-light btn-sm w-100" onclick="accessPanel(2)">⚡ WAREZ</button>
        <button class="btn btn-outline-light btn-sm w-100" onclick="accessPanel(3)">🔥 ZEUS</button>
    </div>

    <div id="listaClientes"></div>
</div>

<!-- Modal Cadastro/Edição --><div class="modal fade" id="modalCadastro" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-secondary"><h5 class="modal-title">📋 Cliente</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <label class="small">Nome:</label><input type="text" id="cNome" class="form-control mb-2">
                <label class="small">Usuário:</label><input type="text" id="cUser" class="form-control mb-2">
                <label class="small">Senha:</label><input type="text" id="cPass" class="form-control mb-2">
                <label class="small">Valor (R$):</label><input type="number" id="cValor" class="form-control mb-2" step="0.01">
                <label class="small">Data Vencimento:</label><input type="date" id="cData" class="form-control mb-2">
                <label class="small">Servidor:</label><input type="text" id="cServ" class="form-control mb-2">
                <label class="small">URL Playlist:</label><input type="text" id="cUrl" class="form-control mb-2">
                <label class="small">WhatsApp (com DDD):</label><input type="tel" id="cTel" class="form-control mb-2" placeholder="55999999999">
                <label class="small">Observações:</label><textarea id="cObs" class="form-control mb-2" rows="2"></textarea>
                <button class="btn btn-success w-100 mt-2 rounded-pill" onclick="saveCliente()">Salvar Cliente</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Ações do Cliente (abre ao clicar no card) -->
<div class="modal fade" id="modalAcoes" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-secondary">
                <div>
                    <h5 class="modal-title" id="acoesTitulo">👤 Cliente</h5>
                    <small class="text-secondary" id="acoesSubtitulo"></small>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="cliente-info mb-3" id="acoesInfoResumo"></div>
                <hr class="border-secondary">
                <div class="modal-acoes-grid" id="acoesGrid"></div>
            </div>        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDd_rtYsto9_0zp8pxYwXRs4XRRip7k3uc",
      authDomain: "itvcontrol.firebaseapp.com",      projectId: "itvcontrol",
      storageBucket: "itvcontrol.firebasestorage.app",
      messagingSenderId: "291731890067",
      appId: "1:291731890067:web:e75e79766765d861db5266"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let clientes = [];
    let config = { msg: "", p1: "", p2: "", p3: "" };
    let currentFilter = 'ativos';
    let usuarioLogadoUid = null;

    document.getElementById('filterMes').value = new Date().toISOString().slice(0, 7);

    auth.onAuthStateChanged(user => {
        if (user) {
            usuarioLogadoUid = user.uid;
            document.getElementById('userEmailDisplay').innerText = user.email || "";
            document.getElementById('authOverlay').style.display = 'none';
            syncConfigAndClients();
        } else {
            usuarioLogadoUid = null;
            document.getElementById('userEmailDisplay').innerText = "";
            document.getElementById('authOverlay').style.display = 'flex';
            document.getElementById('adminLock').style.display = 'none';
        }
    });

    function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const senha = document.getElementById('loginSenha').value.trim();
        if(!email || !senha) return alert("Preencha e-mail e senha.");
        auth.signInWithEmailAndPassword(email, senha).catch(err => alert("Erro: " + err.message));
    }
    function handleLogout() { auth.signOut().then(() => closeNav()); }
    function openNav() { document.getElementById("mySidenav").style.width = "260px"; }    function closeNav() { document.getElementById("mySidenav").style.width = "0"; }
    function unlockApp() { document.getElementById('adminLock').style.display = 'none'; }
    
    function syncConfigAndClients() {
        if(!usuarioLogadoUid) return;
        db.collection("usuarios").doc(usuarioLogadoUid).collection("config").doc("geral").onSnapshot(doc => {
            if(doc.exists) { config = doc.data(); } else { config = { msg: "", p1: "", p2: "", p3: "" }; }
            document.getElementById('cfgMsg').value = config.msg || "";
            document.getElementById('url1').value = config.p1 || "";
            document.getElementById('url2').value = config.p2 || "";
            document.getElementById('url3').value = config.p3 || "";
        });        db.collection("usuarios").doc(usuarioLogadoUid).collection("clientes").onSnapshot(snapshot => {
            clientes = [];
            snapshot.forEach(doc => { clientes.push({ id: doc.id, ...doc.data() }); });
            renderClientes();
        });
    }

    function saveSettings() {
        if(!usuarioLogadoUid) return;
        config = {
            msg: document.getElementById('cfgMsg').value,
            p1: document.getElementById('url1').value,
            p2: document.getElementById('url2').value,
            p3: document.getElementById('url3').value
        };
        db.collection("usuarios").doc(usuarioLogadoUid).collection("config").doc("geral").set(config).then(() => closeNav()).catch(err => alert("Erro: "+err.message));
    }

    function showModalCadastro(id = "") {
        if(id === "") {
            document.getElementById('editId').value = "";
            document.getElementById('cNome').value = ""; document.getElementById('cUser').value = ""; document.getElementById('cPass').value = "";
            document.getElementById('cValor').value = ""; document.getElementById('cData').value = ""; document.getElementById('cServ').value = "";
            document.getElementById('cUrl').value = ""; document.getElementById('cTel').value = ""; document.getElementById('cObs').value = "";
        }
        new bootstrap.Modal(document.getElementById('modalCadastro')).show();
    }

    function saveCliente() {
        if(!usuarioLogadoUid) return;
        const id = document.getElementById('editId').value;
        const clienteData = {
            nome: document.getElementById('cNome').value,
            user: document.getElementById('cUser').value,
            pass: document.getElementById('cPass').value,
            valor: parseFloat(document.getElementById('cValor').value) || 0,
            data: document.getElementById('cData').value,
            serv: document.getElementById('cServ').value,
            url: document.getElementById('cUrl').value,            tel: document.getElementById('cTel').value,
            obs: document.getElementById('cObs').value,
            status: 'ativo'
        };
        const modalEl = document.getElementById('modalCadastro');
        const modal = bootstrap.Modal.getInstance(modalEl);
        
        if(id === "") {
            db.collection("usuarios").doc(usuarioLogadoUid).collection("clientes").add(clienteData).then(() => modal.hide());
        } else {
            const original = clientes.find(c => c.id === id);            if(original) {
                clienteData.status = original.status;
                if(original.ultimoPagamento) clienteData.ultimoPagamento = original.ultimoPagamento;
            }
            db.collection("usuarios").doc(usuarioLogadoUid).collection("clientes").doc(id).set(clienteData).then(() => modal.hide());
        }
    }
    
    function addOneMonthFromToday() {
        let hoje = new Date();
        hoje.setMonth(hoje.getMonth() + 1);
        return hoje.toISOString().split('T')[0];
    }
    
    function formatarDataBR(dataISO) {
        if(!dataISO) return "";
        let partes = dataISO.split('-');
        if(partes.length===3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
        return dataISO;
    }
    
    function renovarCliente(id) {
        const cliente = clientes.find(c => c.id === id);
        if(!cliente) return;
        const novaDataISO = addOneMonthFromToday();
        const novaDataBR = formatarDataBR(novaDataISO);
        const valorFormat = `R$ ${cliente.valor.toFixed(2)}`;
        const msg = `✅𝕊𝔼𝕌 ℙ𝔸𝔾𝔸𝕄𝔼ℕ𝕋𝕆 𝔽𝕆𝕀 ℂ𝕆ℕ𝔽𝕀ℝ𝕄𝔸𝔻𝕆𝕊!!\n\nNome: ${cliente.nome}\nPlano Familia: ${valorFormat}\nProvedor: ${cliente.serv || 'ITV'}\nUsuário: ${cliente.user}\nSenha: ${cliente.pass}\nUrl: ${cliente.url}\nVence: ${novaDataBR}\n\nDivirta-se!!`;
        if(cliente.tel) {
            window.open(`https://wa.me/${cliente.tel.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`);
        } else alert("Número não cadastrado!");
        db.collection("usuarios").doc(usuarioLogadoUid).collection("clientes").doc(id).update({
            data: novaDataISO,
            status: 'ativo',
            ultimoPagamento: new Date().toISOString()
        }).catch(e => alert("Erro ao renovar: "+e.message));
    }
    
    function marcarAReceber(id) {
        const cliente = clientes.find(c => c.id === id);        if(!cliente) return;
        const novaDataISO = addOneMonthFromToday();
        const novaDataBR = formatarDataBR(novaDataISO);
        const valorFormat = `R$ ${cliente.valor.toFixed(2)}`;
        const msg = `⛔️𝕊𝔼𝕌 ℙ𝔸𝔾𝔸𝕄𝔼ℕ𝕋𝕆 ℕ𝔸𝕆 𝔽𝕆𝕀 ℂ𝕆ℕ𝔽𝕀ℝ𝕄𝔸𝔻𝕆𝕊!!\n\nNome: ${cliente.nome}\nPlano Familia: ${valorFormat}\nProvedor: ${cliente.serv || 'ITV'}\nUsuário: ${cliente.user}\nSenha: ${cliente.pass}\nUrl: ${cliente.url}\nVence: ${novaDataBR}\n\nDivirta-se!!`;
        if(cliente.tel) window.open(`https://wa.me/${cliente.tel.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`);
        else alert("Número não cadastrado!");
        db.collection("usuarios").doc(usuarioLogadoUid).collection("clientes").doc(id).update({
            data: novaDataISO,
            status: 'apagar'        });
    }
    
    function pagarCliente(id) {
        const cliente = clientes.find(c => c.id === id);
        if(!cliente) return;
        const dataAtualBR = formatarDataBR(cliente.data);
        const valorFormat = `R$ ${cliente.valor.toFixed(2)}`;
        const msg = `✅𝕊𝔼𝕌 ℙ𝔸𝔾𝔸𝕄𝔼ℕ𝕋𝕆 𝔽𝕆𝕀 ℂ𝕆ℕ𝔽𝕀ℝ𝕄𝔸𝔻𝕆𝕊!!\n\nNome: ${cliente.nome}\nPlano Familia: ${valorFormat}\nProvedor: ${cliente.serv || 'ITV'}\nUsuário: ${cliente.user}\nSenha: ${cliente.pass}\nUrl: ${cliente.url}\nVence: ${dataAtualBR}\n\nDivirta-se!!`;
        if(cliente.tel) window.open(`https://wa.me/${cliente.tel.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`);
        else alert("Número não cadastrado!");
        db.collection("usuarios").doc(usuarioLogadoUid).collection("clientes").doc(id).update({
            status: 'ativo',
            ultimoPagamento: new Date().toISOString()
        });
    }

    // Novo: envia dados de acesso via WhatsApp (COMPARTILHAR)
    function compartilharCliente(id) {
        const c = clientes.find(i => i.id === id);
        if(!c) return;
        if(!c.tel) return alert("Telefone não cadastrado!");
        const msg = `📺 *Dados de Acesso ITV*\n\n👤 Usuário: ${c.user || '-'}\n🔑 Senha: ${c.pass || '-'}\n🔗 Url: ${c.url || '-'}`;
        window.open(`https://wa.me/${c.tel.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`);
    }
    
    // Abre o modal de ações ao clicar no card
    function abrirAcoesCliente(id) {
        const c = clientes.find(i => i.id === id);
        if(!c) return;
        
        document.getElementById('acoesTitulo').innerText = `👤 ${c.nome}`;
        document.getElementById('acoesSubtitulo').innerText = c.status === 'apagar' ? '⏳ Status: A RECEBER' : '';
        
        // Resumo das informações no topo do modal
        let infoHtml = `
            <div class="info-item info-full"><span class="info-label">Nome:</span><span class="info-value">${c.nome}</span></div>
            <div class="info-item"><span class="info-label">Usuário:</span><span class="info-value">${c.user || '-'}</span></div>
            <div class="info-item"><span class="info-label">Senha:</span><span class="info-value">${c.pass || '-'}</span></div>
            <div class="info-item"><span class="info-label">Servidor:</span><span class="info-value">${c.serv || '-'}</span></div>
            <div class="info-item"><span class="info-label">Valor:</span><span class="info-value">R$ ${c.valor.toFixed(2)}</span></div>            <div class="info-item info-full"><span class="info-label">Vencimento:</span><span class="info-value">${formatarDataBR(c.data)}</span></div>
        `;
        document.getElementById('acoesInfoResumo').innerHTML = infoHtml;
        
        const grid = document.getElementById('acoesGrid');
        
        if(c.status === 'deletado') {
            grid.innerHTML = `
                <div class="modal-acoes-row">                    <button class="btn btn-info" onclick="restore('${c.id}'); bootstrap.Modal.getInstance(document.getElementById('modalAcoes')).hide();">♻️ RESTAURAR</button>
                    <button class="btn btn-danger" onclick="hardDelete('${c.id}'); bootstrap.Modal.getInstance(document.getElementById('modalAcoes')).hide();">🗑️ EXCLUIR PERM</button>
                </div>
            `;
        } else if(c.status === 'apagar') {
            // Filtro A RECEBER: apenas 2 botões (PAGAR e EDITAR)
            grid.innerHTML = `
                <div class="modal-acoes-row">
                    <button class="btn btn-success" onclick="pagarCliente('${c.id}'); bootstrap.Modal.getInstance(document.getElementById('modalAcoes')).hide();">✅ PAGAR</button>
                    <button class="btn bg-lilas" onclick="editCliente('${c.id}'); bootstrap.Modal.getInstance(document.getElementById('modalAcoes')).hide();">✏️ EDITAR</button>
                </div>
            `;
        } else {
            // Fila 1: 4 botões - WhatsApp, COBRAR, RENOVAR, A RECEBER
            // Fila 2: 3 botões - COMPARTILHAR, EDITAR, DELETAR
            grid.innerHTML = `
                <div class="modal-acoes-row">
                    <button class="btn" style="background-color:#25D366;" onclick="openWhatsApp('${c.id}'); bootstrap.Modal.getInstance(document.getElementById('modalAcoes')).hide();"><i class="bi bi-whatsapp"></i> ZAP</button>
                    <button class="btn btn-success" onclick="sendCobrancaZap('${c.id}'); bootstrap.Modal.getInstance(document.getElementById('modalAcoes')).hide();">💰 COBRAR</button>
                    <button class="btn btn-warning text-dark" onclick="renovarCliente('${c.id}'); bootstrap.Modal.getInstance(document.getElementById('modalAcoes')).hide();">🔄 RENOVAR</button>
                    <button class="btn btn-secondary" onclick="marcarAReceber('${c.id}'); bootstrap.Modal.getInstance(document.getElementById('modalAcoes')).hide();">⏳ A RECEBER</button>
                </div>
                <div class="modal-acoes-row">
                    <button class="btn btn-info" onclick="compartilharCliente('${c.id}'); bootstrap.Modal.getInstance(document.getElementById('modalAcoes')).hide();">📤 COMPARTILHAR</button>
                    <button class="btn bg-lilas" onclick="editCliente('${c.id}'); bootstrap.Modal.getInstance(document.getElementById('modalAcoes')).hide();">✏️ EDITAR</button>
                    <button class="btn btn-danger" onclick="softDelete('${c.id}'); bootstrap.Modal.getInstance(document.getElementById('modalAcoes')).hide();">🗑️ DELETAR</button>
                </div>
            `;
        }
        
        new bootstrap.Modal(document.getElementById('modalAcoes')).show();
    }
    
    function renderClientes() {
        const listaDiv = document.getElementById('listaClientes');
        const searchTerm = document.getElementById('search').value.toLowerCase();
        listaDiv.innerHTML = "";
        let counts = { ativos:0, vencer:0, exp:0, apagar:0, del:0 };
        const hoje = new Date();
        
        clientes.forEach(c => {
            let dataVenc = new Date(c.data);            let diffDays = Math.ceil((dataVenc - hoje) / (1000*3600*24));
            let statusReal = c.status;
            if(c.status !== 'deletado' && c.status !== 'apagar') {
                if(diffDays < 0) statusReal = 'expirado';
                else if(diffDays <= 3) statusReal = 'vencer';
                else statusReal = 'ativo';
            }
            if(statusReal === 'ativo') counts.ativos++;            if(statusReal === 'vencer') counts.vencer++;
            if(statusReal === 'expirado') counts.exp++;
            if(c.status === 'apagar') counts.apagar++;
            if(c.status === 'deletado') counts.del++;
            
            if(currentFilter === 'ativos' && !(statusReal === 'ativo')) return;
            if(currentFilter === 'vencer' && statusReal !== 'vencer') return;
            if(currentFilter === 'expirados' && statusReal !== 'expirado') return;
            if(currentFilter === 'apagar' && c.status !== 'apagar') return;
            if(currentFilter === 'deletados' && c.status !== 'deletado') return;
            if(!c.nome.toLowerCase().includes(searchTerm)) return;
            
            let badgeClass = 'bg-success';
            if(statusReal === 'expirado') badgeClass = 'bg-danger';
            else if(statusReal === 'vencer') badgeClass = 'bg-warning text-dark';
            let dataExib = c.data.split('-').reverse().join('/');
            
            // Card com informações expandidas (nome, usuário, senha, servidor, valor)
            listaDiv.innerHTML += `
                <div class="card-cliente" onclick="abrirAcoesCliente('${c.id}')">
                    <div class="d-flex justify-content-between align-items-start flex-wrap">
                        <h5 class="mb-1">${c.nome}</h5>
                        <span class="badge ${badgeClass}">${dataExib}</span>
                    </div>
                    <div class="cliente-info">
                        <div class="info-item"><span class="info-label">Usuário:</span><span class="info-value">${c.user || '-'}</span></div>
                        <div class="info-item"><span class="info-label">Senha:</span><span class="info-value">${c.pass || '-'}</span></div>
                        <div class="info-item"><span class="info-label">Servidor:</span><span class="info-value">${c.serv || '-'}</span></div>
                        <div class="info-item"><span class="info-label">Valor:</span><span class="info-value">R$ ${c.valor.toFixed(2)}</span></div>
                    </div>
                </div>
            `;
        });
        
        document.getElementById('countAtivos').innerText = counts.ativos;
        document.getElementById('countVencer').innerText = counts.vencer;
        document.getElementById('countExp').innerText = counts.exp;
        document.getElementById('countPagar').innerText = counts.apagar;
        document.getElementById('countDel').innerText = counts.del;
        renderFinanceiro();
    }
    
    function sendCobrancaZap(id) {        const c = clientes.find(i => i.id === id);
        if(!c) return;
        const msgCobranca = `📩 𝕞𝕤𝕘-𝕒𝕦𝕥𝕠𝕞á𝕥𝕚𝕔𝕒📩\n🚨🚨🚨\nOlá ${c.nome}!!\nSua lista de TV expirou em ${c.data.split('-').reverse().join('/')}\nPara renovar, faça um Pix 💠\n💰Plano: R$ ${c.valor.toFixed(2)}\n${config.msg || ""}`;
        if(c.tel) window.open(`https://wa.me/${c.tel.replace(/\D/g,'')}?text=${encodeURIComponent(msgCobranca)}`);
        else alert("Número não cadastrado!");
    }
        function openWhatsApp(id) {
        const c = clientes.find(i => i.id === id);
        if(c && c.tel) window.open(`https://wa.me/${c.tel.replace(/\D/g,'')}`);
        else alert("Telefone não informado.");
    }
    
    function renderFinanceiro() {
        const mes = document.getElementById('filterMes').value;
        let aReceber = 0;
        let totalGeral = 0;
        let totalActive = 0;
        
        clientes.forEach(c => {
            if(c.status !== 'deletado') {
                let val = parseFloat(c.valor) || 0;
                totalGeral += val;
                totalActive++;
                
                if(c.data && c.data.startsWith(mes)) {
                    const temPagamentoNoMes = c.ultimoPagamento && c.ultimoPagamento.startsWith(mes);
                    if(!temPagamentoNoMes) {
                        aReceber += val;
                    }
                }
            }
        });
        
        const recebido = totalGeral - aReceber;
        
        document.getElementById('finRecebido').innerText = `R$ ${recebido.toFixed(2)}`;
        document.getElementById('finPendente').innerText = `R$ ${aReceber.toFixed(2)}`;
        document.getElementById('finTotalClientes').innerText = totalActive;
        document.getElementById('finGeral').innerText = `R$ ${totalGeral.toFixed(2)}`;
    }
    
    function filterData(f) { currentFilter = f; renderClientes(); }
    function softDelete(id) { if(usuarioLogadoUid) db.collection("usuarios").doc(usuarioLogadoUid).collection("clientes").doc(id).update({ status: 'deletado' }); }
    function restore(id) { if(usuarioLogadoUid) db.collection("usuarios").doc(usuarioLogadoUid).collection("clientes").doc(id).update({ status: 'ativo' }); }
    function hardDelete(id) { if(confirm("Excluir permanentemente?")) db.collection("usuarios").doc(usuarioLogadoUid).collection("clientes").doc(id).delete(); }
    function accessPanel(n) { let u = config['p'+n]; if(u) window.open(u); else alert("Configure a URL no menu lateral."); }
    function editCliente(id) {
        let c = clientes.find(i => i.id === id);
        if(c) {
            document.getElementById('editId').value = c.id;            document.getElementById('cNome').value = c.nome; document.getElementById('cUser').value = c.user; document.getElementById('cPass').value = c.pass;
            document.getElementById('cValor').value = c.valor; document.getElementById('cData').value = c.data; document.getElementById('cServ').value = c.serv;
            document.getElementById('cUrl').value = c.url; document.getElementById('cTel').value = c.tel; document.getElementById('cObs').value = c.obs;
            new bootstrap.Modal(document.getElementById('modalCadastro')).show();
        }
    }    
    window.renovarCliente = renovarCliente;
    window.marcarAReceber = marcarAReceber;
    window.pagarCliente = pagarCliente;
    window.compartilharCliente = compartilharCliente;
    window.abrirAcoesCliente = abrirAcoesCliente;
    window.sendCobrancaZap = sendCobrancaZap;
    window.openWhatsApp = openWhatsApp;
    window.editCliente = editCliente;
    window.softDelete = softDelete;
    window.restore = restore;
    window.hardDelete = hardDelete;
    window.filterData = filterData;
    window.accessPanel = accessPanel;
    window.saveSettings = saveSettings;
    window.showModalCadastro = showModalCadastro;
</script>
